<script>
const B=[{"id": "shinozaki", "name": "篠崎", "brand": "朝倉", "type": "梅酒", "area": "朝倉市", "founded": "", "desc": "江戸時代後期に筑前国・比良松村（現朝倉市）で創業。日本酒・焼酎・甘酒・リキュールを製造。あまおう梅酒「あまおう、はじめました。」は天満天神梅酒大会で2年連続入賞。", "liqueur_type": "umeshu"}, {"id": "nishiyoshida", "name": "西吉田酒造", "brand": "つくし", "type": "梅酒", "area": "筑後市", "founded": "", "desc": "福岡県筑後市の焼酎蔵。本格麦焼酎「つくし」で知られる。「つくし梅酒17度」は全国梅酒品評会2024本格焼酎梅酒部門で金賞受賞。", "liqueur_type": "umeshu"}, {"id": "oga_shuzo", "name": "大賀酒造", "brand": "玉出泉", "type": "梅酒", "area": "筑紫野市", "founded": "1673", "desc": "延宝元年（1673年）創業。福岡県で最も古い酒蔵。宝満山の伏流水を使用し手造りにこだわる。「玉出泉 梅酒」は全国梅酒品評会2024日本酒梅酒部門で銀賞受賞。", "liqueur_type": "umeshu"}, {"id": "wakanami_shuzo", "name": "若波酒造", "brand": "若波", "type": "いちご酒", "area": "大川市", "founded": "1922", "desc": "大正11年（1922年）創業。筑後川のほとりに蔵を構える。九州の特産果実を使ったリキュールブランド「Qdamon（くだもん）」を展開。博多あまおうを使ったいちごリキュールが人気。商品名は九州弁で「果物…", "liqueur_type": "strawberry"}];
const LABELS={'umeshu':'梅酒','yuzu':'ゆず酒','peach':'桃酒','mikan':'みかん酒','strawberry':'いちご酒','matcha':'抹茶','sakura':'桜','melon':'メロン','yogurt':'ヨーグルト','other':'その他'};
document.getElementById('grid').innerHTML=B.map(b=>{
  return '<a class="card" href="/liqueur/fukuoka/'+b.id+'.html">'+
    '<div class="card-name">'+b.name+'</div>'+
    (b.brand?'<div class="card-brand">'+b.brand+'</div>':'')+
    '<div class="card-meta">'+(b.area||'')+(b.founded?' ・ 創業'+b.founded+'年':'')+'</div>'+
    (b.desc?'<div class="card-desc">'+b.desc+'</div>':'')+
    (b.liqueur_type&&LABELS[b.liqueur_type]?'<div style="margin-top:8px;"><span class="tag">'+LABELS[b.liqueur_type]+'</span></div>':'')+
  '</a>';
}).join('');
</script>
