<script>
const B=[{"id": "hakutsuru", "name": "白鶴酒造", "brand": "まるごと搾り", "type": "フルーツリキュール", "area": "神戸市", "founded": "1743", "desc": "寛保3年（1743年）創業。灘五郷の名門蔵が展開する「まるごと搾り」シリーズは、果実をまるごと搾った贅沢なリキュール。", "liqueur_type": "other"}, {"id": "kikumasamune", "name": "菊正宗酒造", "brand": "菊正宗", "type": "梅酒", "area": "神戸市", "founded": "1659", "desc": "万治2年（1659年）創業。灘の名門蔵。日本酒ベースの梅酒やフルーツリキュールを展開。", "liqueur_type": "umeshu"}, {"id": "ozeki", "name": "大関", "brand": "大関", "type": "梅酒", "area": "西宮市", "founded": "1711", "desc": "正徳元年（1711年）創業。ワンカップ大関で知られる灘の名門蔵。梅酒やフルーツリキュールも展開。", "liqueur_type": "umeshu"}, {"id": "sawanotsuru", "name": "沢の鶴", "brand": "沢の鶴", "type": "梅酒", "area": "神戸市", "founded": "1717", "desc": "享保2年（1717年）創業。純米酒に力を入れる灘の蔵元。「古酒仕込み梅酒」は全国梅酒品評会2024日本酒梅酒部門で金賞受賞。", "liqueur_type": "umeshu"}, {"id": "nishiyama_shuzojo", "name": "西山酒造場", "brand": "小鼓", "type": "梅酒", "area": "丹波篠山市", "founded": "1849", "desc": "嘉永2年（1849年）創業。丹波の名門蔵「小鼓」の醸造元。「梅申春秋」は完熟梅のピューレを使ったにごり梅酒で、全国梅酒品評会2024にごり梅酒部門金賞受賞。", "liqueur_type": "umeshu"}, {"id": "houmei", "name": "鳳鳴酒造", "brand": "鳳鳴", "type": "梅酒", "area": "丹波篠山市", "founded": "", "desc": "丹波篠山の酒蔵。日本酒仕込みの梅酒を展開。全国梅酒品評会2024日本酒梅酒部門で銀賞を受賞。", "liqueur_type": "umeshu"}];
const LABELS={'umeshu':'梅酒','yuzu':'ゆず酒','peach':'桃酒','mikan':'みかん酒','strawberry':'いちご酒','matcha':'抹茶','sakura':'桜','melon':'メロン','yogurt':'ヨーグルト','other':'その他'};
